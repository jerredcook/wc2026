name: Daily snapshot + FIFA ranking

# Preserve the live 2026 World Cup data. Runs on GitHub's runners (which can
# reach ESPN — the Anthropic cloud sandbox cannot), captures every played match
# into data/2026-snapshot.json, and commits it when it changes. The script
# merges non-destructively (matches only accumulate; summaries never shrink) and
# exits non-zero if the archive stalls, so a silent ESPN outage emails a failure
# instead of passing green. A separate claude.ai routine reads this file and
# emails the summary.

on:
  schedule:
    - cron: "0 13 * * *"   # 13:00 UTC = 9:00 AM US Eastern, daily
  workflow_dispatch: {}     # allow manual runs from the Actions tab / gh CLI

permissions:
  contents: write           # so the job can push the updated snapshot

concurrency:
  group: snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"   # current LTS; the scripts use only stable Node APIs (global fetch, fs/promises)

      - name: Capture live snapshot
        run: node scripts/snapshot-live.mjs

      # Runs even if the snapshot stalls (if: always) — rankings come from a
      # different source (FIFA), so one outage shouldn't block the other.
      - name: Fetch FIFA world ranking
        if: always()
        run: node scripts/fetch-rankings.mjs

      - name: Commit changed data
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/2026-snapshot.json data/rankings.json)" ]; then
            git add data/2026-snapshot.json data/rankings.json
            git commit -m "Update live data — snapshot + FIFA ranking ($(date -u +%Y-%m-%d))"
            git pull --rebase origin main   # avoid losing the capture to a race with a manual push
            git push
            echo "Pushed updated data."
          else
            echo "No data changes — nothing to commit."
          fi
